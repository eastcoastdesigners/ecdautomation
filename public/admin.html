<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECD Admin — Lead CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { navy: '#0F172A', green: '#22C55E' },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="font-sans bg-gray-50 min-h-screen">

  <!-- Login screen -->
  <div id="loginScreen" class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-10 w-full max-w-sm">
      <div class="text-center mb-8">
        <div class="text-2xl font-black text-navy mb-1">ECD Admin</div>
        <div class="text-gray-400 text-sm">Lead CRM — Private</div>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-navy mb-1.5">Username</label>
          <input id="loginUser" type="text" value="admin" class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-green transition-all" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-navy mb-1.5">Password</label>
          <input id="loginPass" type="password" placeholder="Enter password"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-green transition-all" />
        </div>
        <div id="loginError" class="hidden text-red-600 text-sm bg-red-50 border border-red-200 rounded-xl px-4 py-3"></div>
        <button id="loginBtn" class="w-full bg-navy text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition-all">
          Sign In
        </button>
      </div>
    </div>
  </div>

  <!-- CRM dashboard -->
  <div id="crmScreen" class="hidden">
    <!-- Top bar -->
    <header class="bg-navy text-white px-6 py-4 flex items-center justify-between shadow-lg">
      <div class="font-bold text-lg">
        <span class="text-green">ECD</span> Admin
      </div>
      <div class="flex items-center gap-4">
        <span id="adminWelcome" class="text-gray-400 text-sm hidden sm:block"></span>
        <button id="exportBtn" class="bg-green/20 text-green text-sm font-semibold px-4 py-2 rounded-lg hover:bg-green/30 transition-all">
          Export CSV
        </button>
        <button id="logoutBtn" class="text-gray-400 hover:text-white text-sm transition-colors">Sign Out</button>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
      <!-- Status summary -->
      <div id="statusSummary" class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8"></div>

      <!-- Leads table -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
          <h2 class="font-bold text-navy">All Leads</h2>
          <button id="refreshBtn" class="text-gray-400 hover:text-navy text-sm transition-colors">↻ Refresh</button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-gray-50 border-b border-gray-100">
              <tr>
                <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wide">Name</th>
                <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wide">Email</th>
                <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wide">Phone</th>
                <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wide">Message</th>
                <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wide">Vibe</th>
                <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wide">Last Contacted</th>
                <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wide">Source</th>
                <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wide">Date</th>
                <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wide">Status</th>
                <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wide"></th>
              </tr>
            </thead>
            <tbody id="leadsTableBody" class="divide-y divide-gray-50">
              <tr>
                <td colspan="10" class="px-4 py-12 text-center text-gray-400">Loading leads...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    const STATUS_LABELS = {
      new: { label: 'New', color: 'bg-blue-100 text-blue-700' },
      contacted: { label: 'Contacted', color: 'bg-yellow-100 text-yellow-700' },
      demo_booked: { label: 'Demo Booked', color: 'bg-purple-100 text-purple-700' },
      closed_won: { label: 'Closed Won', color: 'bg-green-100 text-green-700' },
      closed_lost: { label: 'Closed Lost', color: 'bg-red-100 text-red-700' }
    };

    const VIBE_LABELS = {
      '':     { label: '—',         emoji: '' },
      'hot':  { label: 'Hot',  emoji: '🔥' },
      'warm': { label: 'Warm', emoji: '🌤️' },
      'cold': { label: 'Cold', emoji: '❄️' }
    };

    const VIBE_ROW_BG = {
      'hot':  'bg-rose-50 hover:bg-rose-100',
      'warm': 'bg-amber-50 hover:bg-amber-100',
      'cold': 'bg-sky-50 hover:bg-sky-100'
    };

    function formatLastContacted(iso) {
      if (!iso) return '—';
      const d = new Date(iso.endsWith('Z') ? iso : iso + 'Z');
      if (isNaN(d.getTime())) return '—';
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatHistoryTimestamp(iso) {
      if (!iso) return '';
      const d = new Date(iso.endsWith('Z') ? iso : iso + 'Z');
      if (isNaN(d.getTime())) return iso;
      return d.toLocaleString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: 'numeric', minute: '2-digit'
      });
    }

    let authHeader = '';
    let allLeads = [];

    // Login
    async function doLogin() {
      const user = document.getElementById('loginUser').value.trim();
      const pass = document.getElementById('loginPass').value;
      const loginError = document.getElementById('loginError');
      loginError.classList.add('hidden');

      if (!user || !pass) {
        loginError.textContent = 'Enter username and password.';
        loginError.classList.remove('hidden');
        return;
      }

      authHeader = 'Basic ' + btoa(user + ':' + pass);
      const res = await fetch('/api/leads', { headers: { Authorization: authHeader } });

      if (res.status === 401) {
        loginError.textContent = 'Invalid username or password.';
        loginError.classList.remove('hidden');
        authHeader = '';
        return;
      }

      const leads = await res.json();
      allLeads = leads;
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('crmScreen').classList.remove('hidden');
      document.getElementById('adminWelcome').textContent = `Signed in as ${user}`;
      document.getElementById('adminWelcome').classList.remove('hidden');
      renderLeads(leads);
    }

    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.getElementById('loginPass').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      authHeader = '';
      allLeads = [];
      document.getElementById('crmScreen').classList.add('hidden');
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('loginPass').value = '';
    });

    document.getElementById('refreshBtn').addEventListener('click', loadLeads);

    async function loadLeads() {
      const res = await fetch('/api/leads', { headers: { Authorization: authHeader } });
      if (res.ok) {
        allLeads = await res.json();
        renderLeads(allLeads);
      }
    }

    function renderLeads(leads) {
      // Status summary
      const counts = {};
      Object.keys(STATUS_LABELS).forEach(s => counts[s] = 0);
      leads.forEach(l => { if (counts[l.status] !== undefined) counts[l.status]++; });

      const summaryEl = document.getElementById('statusSummary');
      summaryEl.innerHTML = Object.entries(STATUS_LABELS).map(([key, { label, color }]) => `
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm px-5 py-4 text-center">
          <div class="text-2xl font-black text-navy">${counts[key]}</div>
          <div class="text-xs font-semibold mt-1"><span class="inline-block px-2 py-0.5 rounded-full ${color}">${label}</span></div>
        </div>
      `).join('');

      // Table
      const tbody = document.getElementById('leadsTableBody');
      if (leads.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" class="px-4 py-12 text-center text-gray-400">No leads yet. Share the site!</td></tr>';
        return;
      }

      tbody.innerHTML = leads.map(lead => {
        const date = new Date(lead.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const lastContacted = formatLastContacted(lead.last_contacted);
        const vibe = lead.vibe || '';
        const rowBg = VIBE_ROW_BG[vibe] || 'hover:bg-gray-50';

        const statusOptions = Object.entries(STATUS_LABELS).map(([key, { label }]) =>
          `<option value="${key}" ${lead.status === key ? 'selected' : ''}>${label}</option>`
        ).join('');

        const vibeOptions = Object.entries(VIBE_LABELS).map(([key, { label, emoji }]) =>
          `<option value="${key}" ${vibe === key ? 'selected' : ''}>${emoji ? emoji + ' ' + label : label}</option>`
        ).join('');

        return `
          <tr class="${rowBg} transition-colors" data-lead-row="${lead.id}">
            <td class="px-4 py-4 font-semibold text-navy whitespace-nowrap">${escapeHtml(lead.name)}</td>
            <td class="px-4 py-4 text-gray-600">
              <a href="mailto:${escapeHtml(lead.email)}" class="hover:text-green transition-colors">${escapeHtml(lead.email)}</a>
            </td>
            <td class="px-4 py-4 text-gray-600 whitespace-nowrap">
              <a href="tel:${escapeHtml(lead.phone)}" class="hover:text-green transition-colors">${escapeHtml(lead.phone)}</a>
            </td>
            <td class="px-4 py-4 text-gray-500 max-w-xs">
              <div class="truncate" title="${escapeHtml(lead.message)}">${escapeHtml(lead.message)}</div>
            </td>
            <td class="px-4 py-4">
              <select data-id="${lead.id}" class="vibe-select text-xs font-semibold border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none focus:border-green cursor-pointer transition-all bg-white">
                ${vibeOptions}
              </select>
            </td>
            <td class="px-4 py-4 text-gray-500 text-xs whitespace-nowrap" data-last-contacted="${lead.id}">${lastContacted}</td>
            <td class="px-4 py-4 text-gray-400 text-xs">${escapeHtml(lead.source)}</td>
            <td class="px-4 py-4 text-gray-400 text-xs whitespace-nowrap">${date}</td>
            <td class="px-4 py-4">
              <select data-id="${lead.id}" class="status-select text-xs font-semibold border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none focus:border-green cursor-pointer transition-all bg-white">
                ${statusOptions}
              </select>
            </td>
            <td class="px-4 py-4 text-right">
              <button data-expand="${lead.id}" class="expand-btn text-gray-400 hover:text-navy text-lg leading-none px-2 py-1 transition-colors" aria-label="Expand details">▾</button>
            </td>
          </tr>
          <tr id="detail-${lead.id}" class="hidden detail-row">
            <td colspan="10" class="px-6 py-5 bg-gray-50 border-t border-gray-100">
              <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-1">
                  <div class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Original message</div>
                  <div class="text-sm text-gray-700 whitespace-pre-wrap break-words bg-white rounded-lg border border-gray-100 p-3">${escapeHtml(lead.message)}</div>
                </div>
                <div class="md:col-span-2">
                  <div class="flex items-center justify-between mb-2">
                    <label for="notes-${lead.id}" class="text-xs font-bold text-gray-500 uppercase tracking-wide">Notes</label>
                    <span class="text-xs text-gray-400" data-notes-status="${lead.id}"></span>
                  </div>
                  <textarea
                    id="notes-${lead.id}"
                    data-notes-id="${lead.id}"
                    rows="4"
                    placeholder="Add internal notes about this lead… auto-saves when you click away."
                    class="notes-textarea w-full text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:border-green focus:ring-1 focus:ring-green/20 transition-all resize-y bg-white">${escapeHtml(lead.notes || '')}</textarea>
                  <div class="flex justify-end mt-2">
                    <button data-save-notes="${lead.id}" class="save-notes-btn bg-navy text-white text-xs font-semibold px-4 py-1.5 rounded-lg hover:bg-slate-800 transition-all">Save</button>
                  </div>

                  <div class="mt-4">
                    <button data-toggle-history="${lead.id}" class="history-toggle text-xs font-semibold text-gray-500 hover:text-navy transition-colors flex items-center gap-1">
                      <span class="history-chevron">▸</span> History
                    </button>
                    <div id="history-${lead.id}" class="hidden mt-3 space-y-2"></div>
                  </div>
                </div>
              </div>
            </td>
          </tr>
        `;
      }).join('');

      // Status change handlers
      tbody.querySelectorAll('.status-select').forEach(select => {
        select.addEventListener('change', async (e) => {
          const id = e.target.dataset.id;
          const status = e.target.value;
          await fetch(`/api/leads/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', Authorization: authHeader },
            body: JSON.stringify({ status })
          });
          await loadLeads();
        });
      });

      // Vibe change handlers
      tbody.querySelectorAll('.vibe-select').forEach(select => {
        select.addEventListener('change', async (e) => {
          const id = e.target.dataset.id;
          const vibe = e.target.value;
          const res = await fetch(`/api/leads/${id}/vibe`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', Authorization: authHeader },
            body: JSON.stringify({ vibe })
          });
          if (res.ok) {
            // Update row tint without a full reload
            const row = tbody.querySelector(`tr[data-lead-row="${id}"]`);
            if (row) {
              ['bg-rose-50','hover:bg-rose-100','bg-amber-50','hover:bg-amber-100','bg-sky-50','hover:bg-sky-100','hover:bg-gray-50']
                .forEach(c => row.classList.remove(c));
              const newClasses = (VIBE_ROW_BG[vibe] || 'hover:bg-gray-50').split(' ');
              newClasses.forEach(c => row.classList.add(c));
            }
          }
        });
      });

      // Expand/collapse details row
      tbody.querySelectorAll('.expand-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.expand;
          const detail = document.getElementById(`detail-${id}`);
          const isHidden = detail.classList.toggle('hidden');
          btn.textContent = isHidden ? '▾' : '▴';
        });
      });

      // Notes save (manual button + autosave on blur)
      async function saveNotes(id, textarea, statusEl) {
        const notes = textarea.value;
        statusEl.textContent = 'Saving…';
        statusEl.className = 'text-xs text-gray-400';
        try {
          const res = await fetch(`/api/leads/${id}/notes`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', Authorization: authHeader },
            body: JSON.stringify({ notes })
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          statusEl.textContent = '✓ Saved';
          statusEl.className = 'text-xs text-green';
          // Update last_contacted cell in the row
          const lcCell = document.querySelector(`[data-last-contacted="${id}"]`);
          if (lcCell) lcCell.textContent = formatLastContacted(data.last_contacted);
          // Fade the saved indicator after 2s
          setTimeout(() => { if (statusEl.textContent === '✓ Saved') statusEl.textContent = ''; }, 2000);
        } catch (err) {
          console.error('Notes save failed:', err);
          statusEl.textContent = '✗ Save failed';
          statusEl.className = 'text-xs text-red-600';
        }
      }

      tbody.querySelectorAll('.notes-textarea').forEach(ta => {
        const id = ta.dataset.notesId;
        const statusEl = tbody.querySelector(`[data-notes-status="${id}"]`);
        let lastSaved = ta.value;
        ta.addEventListener('blur', () => {
          if (ta.value !== lastSaved) {
            saveNotes(id, ta, statusEl);
            lastSaved = ta.value;
          }
        });
      });
      tbody.querySelectorAll('.save-notes-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.saveNotes;
          const ta = document.getElementById(`notes-${id}`);
          const statusEl = tbody.querySelector(`[data-notes-status="${id}"]`);
          saveNotes(id, ta, statusEl);
        });
      });

      // History toggle (lazy-loads on first open)
      tbody.querySelectorAll('.history-toggle').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.toggleHistory;
          const panel = document.getElementById(`history-${id}`);
          const chevron = btn.querySelector('.history-chevron');
          const willOpen = panel.classList.contains('hidden');
          panel.classList.toggle('hidden');
          chevron.textContent = willOpen ? '▾' : '▸';
          if (willOpen && !panel.dataset.loaded) {
            panel.innerHTML = '<div class="text-xs text-gray-400 italic">Loading…</div>';
            try {
              const res = await fetch(`/api/leads/${id}/activity`, {
                headers: { Authorization: authHeader }
              });
              if (!res.ok) throw new Error(`HTTP ${res.status}`);
              const entries = await res.json();
              if (entries.length === 0) {
                panel.innerHTML = '<div class="text-xs text-gray-400 italic">No history yet — edit the notes above to start a log.</div>';
              } else {
                panel.innerHTML = entries.map(e => `
                  <div class="bg-white border border-gray-100 rounded-lg p-3">
                    <div class="text-xs font-semibold text-gray-500 mb-1">${formatHistoryTimestamp(e.timestamp)}</div>
                    <div class="text-sm text-gray-700 whitespace-pre-wrap break-words">${escapeHtml(e.note_text)}</div>
                  </div>
                `).join('');
              }
              panel.dataset.loaded = '1';
            } catch (err) {
              console.error('History fetch failed:', err);
              panel.innerHTML = '<div class="text-xs text-red-600">Failed to load history.</div>';
            }
          }
        });
      });
    }

    // CSV export
    document.getElementById('exportBtn').addEventListener('click', () => {
      if (!allLeads.length) return;
      const headers = ['ID', 'Name', 'Email', 'Phone', 'Message', 'Source', 'Status', 'Date'];
      const rows = allLeads.map(l => [
        l.id, l.name, l.email, l.phone,
        `"${(l.message || '').replace(/"/g, '""')}"`,
        l.source, l.status, l.created_at
      ]);
      const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `ecd-leads-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    });

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str || ''));
      return div.innerHTML;
    }
  </script>
</body>
</html>
